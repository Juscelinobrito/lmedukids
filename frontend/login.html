<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM EduKids | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<main class="auth-overlay" style="display:flex;">
  <section class="auth-box">
    <h1 style="margin:0 0 8px;font-size:32px;">LM EduKids</h1>
    <p style="margin:0 0 20px;text-align:center;color:#667085;">Entre para acessar a plataforma.</p>
    <h2 id="authTitle">Entrar</h2>
    <p id="authFeedback" style="min-height:20px;margin:0 0 12px;text-align:center;font-size:14px;"></p>

    <form id="loginForm">
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" placeholder="Email" autocomplete="email">
      <label for="authPassword">Senha</label>
      <input id="authPassword" type="password" placeholder="Senha" autocomplete="current-password">
      <button id="btnAuthAction" type="submit">Entrar</button>
      <p>Não tem conta? <a href="#" id="linkShowSignup">Registrar</a></p>
    </form>

    <form id="signupForm" style="display:none;">
      <label for="signupName">Nome completo</label>
      <input id="signupName" type="text" placeholder="Nome completo" autocomplete="name">
      <label for="signupEmail">Email</label>
      <input id="signupEmail" type="email" placeholder="Email" autocomplete="email">
      <label for="signupWhatsapp">Tel. WhatsApp</label>
      <input id="signupWhatsapp" type="tel" placeholder="Tel. WhatsApp" inputmode="tel" autocomplete="tel">
      <label for="signupPassword">Senha</label>
      <input id="signupPassword" type="password" placeholder="Senha" autocomplete="new-password">
      <label for="signupRole">Perfil</label>
      <select id="signupRole">
        <option value="student">Aluno</option>
        <option value="teacher">Professor</option>
        <option value="teacher">Pai</option>
        <option value="teacher">Mãe</option>
        <option value="teacher">Responsável</option>
      </select>
      <label for="signupGrade">Ano</label>
      <input id="signupGrade" type="number" placeholder="Ano (1-9)" min="1" max="9">
      <button id="btnSignupAction" type="submit">Registrar</button>
      <p>Já tem conta? <a href="#" id="linkShowLogin">Entrar</a></p>
    </form>
  </section>
</main>

<script type="module" src="login.js"></script>
</body>
</html>
